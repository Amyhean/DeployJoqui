<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./SRC/img/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="./CSS/style.css">
    <link rel="stylesheet" href="./CSS/cards.css">
    <link rel="stylesheet" href="./CSS/whats.css">
    <link rel="stylesheet" href="./CSS/actr.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <title>Actividades Proximas</title>
</head>

<body>
    <!--Navbar-->
    <header id="navbar"></header>

    <div class="container">
        <div class="row row-cols-1 row-cols-md-2 g-4">
            <div class="col-md-12">
                <div class="card mb-3" style="border: none;">
                  <section id="facebook-feed" class="container my-5">
                    <h2 class="text-center mb-4 fw-bold" style="color:#2d2d2d;">
                        🌟 Entérate de lo último | Próximas actividades y novedades 🌿
                    </h2>
                
                    <div id="facebook-posts" class="row row-cols-1 row-cols-md-3 g-4 justify-content-center text-center">
                        <p>Cargando publicaciones...</p>
                    </div>
                </section>
                
                
                <script>
                    const pageId = "1955422051387027";
                    const accessToken = "EAA0vuswicl0BQ3yZCFesXere1ydrYzubJiFjyVuM1G5Ge4m66onWeAThoraddixzjjmYZAOIsY5FsIltZCZA9kZCd1BxZAC4i9MQzmDzYPaEBJou7CgZCnA8aiaECZBlij29o4FvLwF52wAkqgXzV2CSJiZAYJsNSZCSomFARiJNZAaYXcoAZBBMXbzBAFNwkKmqNFe2p9SWnojv1cDtIZAqDqHQ1ZAPrU0zlSzaBEuF6PHIAZD";

                    const url = `https://graph.facebook.com/v19.0/${pageId}/posts` +
                        `?fields=message,permalink_url,full_picture,created_time` +
                        `&limit=3&access_token=${encodeURIComponent(accessToken)}`;

                    fetch(url)
                        .then(async (res) => {
                            const json = await res.json();
                            if (!res.ok) {
                                console.error("Facebook HTTP:", res.status, json);
                                throw new Error(json?.error?.message || `HTTP ${res.status}`);
                            }
                            return json;
                        })
                        .then((data) => {
                            const posts = data.data;
                            if (!Array.isArray(posts)) {
                                console.error("Respuesta inesperada:", data);
                                throw new Error("No llegó data.data como arreglo");
                            }

                            let html = "";
                            posts.forEach((post) => {
                                html += `
                          <div class="col">
                            <div class="card h-100 shadow-sm border-0">
                              ${post.full_picture ? `<img src="${post.full_picture}" class="card-img-top" alt="Publicación de Facebook">` : ''}
                              <div class="card-body">
                                <p class="card-text">${post.message ? post.message.substring(0, 150) + '...' : '(Sin texto)'}</p>
                                <a href="${post.permalink_url}" target="_blank" class="btn btn-primary">Ver en Facebook</a>
                              </div>
                              <div class="card-footer text-muted">
                                ${new Date(post.created_time).toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' })}
                              </div>
                            </div>
                          </div>
                        `;
                            });

                            document.getElementById('facebook-posts').innerHTML = html || `<p>No hay publicaciones para mostrar.</p>`;
                        })
                        .catch((err) => {
                            console.error("Error al cargar publicaciones:", err);
                            document.getElementById('facebook-posts').innerHTML =
                                `<p class="text-danger">No se pudieron cargar las publicaciones en este momento.</p>`;
                        });
                </script>



                </div>
            </div>
        </div>
    </div>



    <div class="right">
        <img class="btn-whatsapp" src="https://clientes.dongee.com/whatsapp.png" width="64" height="64" alt="Whatsapp"
            onclick="window.location.href='https://wa.me/+525524105619?text=Hola!%20Estoy%20interesado%20en%20asistir%20al%20parque'" />
    </div>
    <div id="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
    <script src="./JS/main.js"></script>
    <script src="./JS/footer.js"></script>
</body>

</html>
