<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./SRC/img/logo.png" type="image/x-icon">

    <link rel="stylesheet" href="./CSS/style.css">
    <link rel="stylesheet" href="./CSS/cards.css">
    <link rel="stylesheet" href="./CSS/whats.css">
    <link rel="stylesheet" href="./CSS/actr.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Actividades Anteriores</title>

    <style>
        .act-grid {
            margin-top: 1.5rem;
            margin-bottom: 2rem;
        }

        .activity-card {
            border: 0;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .08);
        }

        .activity-card .card-body {
            padding: 1rem 1rem 1.25rem;
        }

        .activity-card .card-title {
            font-size: 1.2rem;
            margin: 0;
        }

        .act-carousel {
            height: 220px;
            background: #f3f3f3;
        }

        .act-carousel .carousel-inner,
        .act-carousel .carousel-item {
            height: 220px;
        }

        .act-carousel img {
            height: 220px;
            width: 100%;
            object-fit: cover;
        }

        .act-carousel .carousel-control-prev-icon,
        .act-carousel .carousel-control-next-icon {
            filter: drop-shadow(0 2px 2px rgba(0, 0, 0, .5));
        }
    </style>
</head>

<body>

    <header id="navbar"></header>

    <div class="container act-grid">

        <div id="activityContainer" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">

            <!-- Estacional de primavera 2026 -->
            <div class="col" data-date="2026-03-14">

                            <div class="carousel-item">
                                <img src="./SRC/img/WhatsApp Image 2026-03-22 at 19.36.05.jpeg">
                            </div>

                        </div>

                        <button class="carousel-control-prev" type="button" data-bs-target="#carouselEstacional2026"

                        <button class="carousel-control-next" type="button" data-bs-target="#carouselEstacional2026"
                            data-bs-slide="next">

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./JS/main.js"></script>
    <script src="./JS/footer.js"></script>

    <script>

        document.addEventListener("DOMContentLoaded", function () {

            const container = document.getElementById("activityContainer");

            const cards = Array.from(container.querySelectorAll(".col"));

            cards.sort((a, b) => {

                const dateA = new Date(a.dataset.date);
                const dateB = new Date(b.dataset.date);

                return dateB - dateA;

            });

            cards.forEach(card => container.appendChild(card));

        });

    </script>

</body>
